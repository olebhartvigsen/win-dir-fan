<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- 3 documents fanning bottom-left → top-right, spreadsheet in front -->

  <!-- Back: Word doc (blue) — leftmost -->
  <g transform="translate(95,250) rotate(-10)">
    <rect x="-44" y="-195" width="88" height="120" rx="8" fill="#3B82F6" stroke="#000" stroke-width="3"/>
    <rect x="-30" y="-181" width="44" height="5" rx="2" fill="#fff" opacity="0.85"/>
    <rect x="-30" y="-170" width="58" height="5" rx="2" fill="#fff" opacity="0.7"/>
    <rect x="-30" y="-159" width="50" height="5" rx="2" fill="#fff" opacity="0.7"/>
    <rect x="-30" y="-148" width="58" height="5" rx="2" fill="#fff" opacity="0.55"/>
    <rect x="-30" y="-137" width="36" height="5" rx="2" fill="#fff" opacity="0.55"/>
    <rect x="-30" y="-120" width="58" height="5" rx="2" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Middle: Image file (purple) -->
  <g transform="translate(95,250) rotate(10)">
    <rect x="-44" y="-200" width="88" height="120" rx="8" fill="#A855F7" stroke="#000" stroke-width="3"/>
    <rect x="-33" y="-189" width="66" height="46" rx="5" fill="#fff" opacity="0.25"/>
    <circle cx="10" cy="-174" r="9" fill="#FBBF24"/>
    <polygon points="-33,-143 -8,-170 18,-143" fill="#fff" opacity="0.7"/>
    <polygon points="2,-143 22,-163 33,-143" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Front: Spreadsheet (green) — rightmost, on top -->
  <g transform="translate(95,250) rotate(28)">
    <rect x="-44" y="-208" width="88" height="120" rx="8" fill="#22C55E" stroke="#000" stroke-width="3"/>
    <line x1="-14" y1="-198" x2="-14" y2="-98" stroke="#fff" stroke-width="6" opacity="1"/>
    <line x1="14"  y1="-198" x2="14"  y2="-98" stroke="#fff" stroke-width="6" opacity="1"/>
    <line x1="-34" y1="-178" x2="34"  y2="-178" stroke="#fff" stroke-width="6" opacity="1"/>
    <line x1="-34" y1="-158" x2="34"  y2="-158" stroke="#fff" stroke-width="6" opacity="1"/>
    <line x1="-34" y1="-138" x2="34"  y2="-138" stroke="#fff" stroke-width="6" opacity="1"/>
    <line x1="-34" y1="-118" x2="34"  y2="-118" stroke="#fff" stroke-width="6" opacity="1"/>
  </g>
</svg>
