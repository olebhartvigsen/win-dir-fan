<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!--
    FanFolder app icon — CLOSED STATE
    Three file cards stacked with a tight fan (ready-to-open look).
    Same composition as open state but with rotations pulled in so
    the cards read as a neat pile.
  -->
  <defs>
    <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5CE08C"/>
      <stop offset="100%" stop-color="#15A34A"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8A5FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DAEFF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cardGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-20%" width="160%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hinge roughly centered; tighter rotations for pile look -->
  <!-- Back: Blue document -->
  <g transform="translate(128,240) rotate(-8)" filter="url(#cardShadow)">
    <rect x="-50" y="-198" width="100" height="138" rx="11" fill="url(#gBlue)"/>
    <rect x="-50" y="-198" width="100" height="138" rx="11" fill="url(#cardGloss)"/>
    <rect x="-50" y="-198" width="100" height="138" rx="11" fill="none" stroke="#1e3a8a" stroke-opacity="0.45" stroke-width="1.5"/>
    <g fill="#ffffff">
      <rect x="-34" y="-184" width="52" height="7" rx="3" opacity="0.95"/>
      <rect x="-34" y="-168" width="68" height="6" rx="3" opacity="0.8"/>
      <rect x="-34" y="-154" width="58" height="6" rx="3" opacity="0.8"/>
      <rect x="-34" y="-140" width="68" height="6" rx="3" opacity="0.65"/>
      <rect x="-34" y="-126" width="44" height="6" rx="3" opacity="0.65"/>
      <rect x="-34" y="-104" width="68" height="6" rx="3" opacity="0.5"/>
    </g>
  </g>

  <!-- Middle: Purple image -->
  <g transform="translate(128,240) rotate(0)" filter="url(#cardShadow)">
    <rect x="-52" y="-212" width="104" height="144" rx="12" fill="url(#gPurple)"/>
    <rect x="-52" y="-212" width="104" height="144" rx="12" fill="url(#cardGloss)"/>
    <rect x="-52" y="-212" width="104" height="144" rx="12" fill="none" stroke="#4c1d95" stroke-opacity="0.45" stroke-width="1.5"/>
    <rect x="-38" y="-200" width="76" height="58" rx="6" fill="#ffffff" opacity="0.22"/>
    <circle cx="16" cy="-182" r="10" fill="#FDE047"/>
    <polygon points="-38,-142 -8,-182 22,-142" fill="#ffffff" opacity="0.78"/>
    <polygon points="6,-142 26,-172 38,-142" fill="#ffffff" opacity="0.55"/>
    <rect x="-34" y="-128" width="48" height="5" rx="2" fill="#ffffff" opacity="0.75"/>
    <rect x="-34" y="-116" width="66" height="5" rx="2" fill="#ffffff" opacity="0.55"/>
    <rect x="-34" y="-104" width="40" height="5" rx="2" fill="#ffffff" opacity="0.45"/>
  </g>

  <!-- Front: Green spreadsheet -->
  <g transform="translate(128,240) rotate(8)" filter="url(#cardShadow)">
    <rect x="-54" y="-224" width="108" height="150" rx="12" fill="url(#gGreen)"/>
    <rect x="-54" y="-224" width="108" height="150" rx="12" fill="url(#cardGloss)"/>
    <rect x="-54" y="-224" width="108" height="150" rx="12" fill="none" stroke="#14532d" stroke-opacity="0.5" stroke-width="1.5"/>
    <g stroke="#ffffff" stroke-linecap="round">
      <line x1="-18" y1="-210" x2="-18" y2="-90" stroke-width="5" opacity="0.92"/>
      <line x1="18"  y1="-210" x2="18"  y2="-90" stroke-width="5" opacity="0.92"/>
      <line x1="-42" y1="-184" x2="42"  y2="-184" stroke-width="5" opacity="0.92"/>
      <line x1="-42" y1="-158" x2="42"  y2="-158" stroke-width="5" opacity="0.92"/>
      <line x1="-42" y1="-132" x2="42"  y2="-132" stroke-width="5" opacity="0.92"/>
      <line x1="-42" y1="-106" x2="42"  y2="-106" stroke-width="5" opacity="0.92"/>
    </g>
  </g>
</svg>
