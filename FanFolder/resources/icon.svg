<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768" role="img" aria-label="FanFolder icon">
  <defs>
    <!-- Green folder (spreadsheet) -->
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#4ccf7a"/>
      <stop offset="0.5" stop-color="#25a957"/>
      <stop offset="1"   stop-color="#116a33"/>
    </linearGradient>

    <!-- Clip for spreadsheet content inside the rounded card -->
    <clipPath id="greenCardClip">
      <rect x="-170" y="-230" width="340" height="460" rx="32" ry="32"/>
    </clipPath>

    <!-- Clip for word doc content inside the yellow card -->
    <clipPath id="yellowCardClip">
      <rect x="-170" y="-230" width="340" height="460" rx="32" ry="32"/>
    </clipPath>

    <!-- Yellow folder -->
    <linearGradient id="yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#f7cc5c"/>
      <stop offset="0.5" stop-color="#eaa82c"/>
      <stop offset="1"   stop-color="#b8790f"/>
    </linearGradient>

    <!-- Paper -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e4e6e9"/>
    </linearGradient>

    <!-- Folded corner -->
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9ccd1"/>
      <stop offset="1" stop-color="#9fa3a8"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Green spreadsheet card (back-left, rotated left) -->
  <g transform="translate(250 430) rotate(-14)" filter="url(#softShadow)">
    <rect x="-170" y="-230" width="340" height="460" rx="32" ry="32" fill="url(#green)"/>

    <g clip-path="url(#greenCardClip)">
      <!-- Vertical grid lines -->
      <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="2">
        <line x1="-110" y1="-230" x2="-110" y2="230"/>
        <line x1=" -40" y1="-230" x2=" -40" y2="230"/>
        <line x1="  30" y1="-230" x2="  30" y2="230"/>
        <line x1=" 100" y1="-230" x2=" 100" y2="230"/>
      </g>

      <!-- Horizontal grid lines -->
      <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="2">
        <line x1="-170" y1="-160" x2="170" y2="-160"/>
        <line x1="-170" y1=" -95" x2="170" y2=" -95"/>
        <line x1="-170" y1=" -30" x2="170" y2=" -30"/>
        <line x1="-170" y1="  35" x2="170" y2="  35"/>
        <line x1="-170" y1=" 100" x2="170" y2=" 100"/>
        <line x1="-170" y1=" 165" x2="170" y2=" 165"/>
      </g>
    </g>
  </g>

  <!-- Yellow word-doc card (back-right, rotated right) -->
  <g transform="translate(520 430) rotate(12)" filter="url(#softShadow)">
    <rect x="-170" y="-230" width="340" height="460" rx="32" ry="32" fill="url(#yellow)"/>

    <g clip-path="url(#yellowCardClip)">
      <!-- Text lines (paragraphs of varying width) -->
      <g fill="#ffffff" fill-opacity="0.55">
        <rect x="-130" y="-170" width="260" height="14" rx="7"/>
        <rect x="-130" y="-135" width="220" height="14" rx="7"/>
        <rect x="-130" y="-100" width="250" height="14" rx="7"/>
        <rect x="-130"  y="-65" width="180" height="14" rx="7"/>

        <rect x="-130"  y="-10" width="260" height="14" rx="7"/>
        <rect x="-130"   y="25" width="240" height="14" rx="7"/>
        <rect x="-130"   y="60" width="200" height="14" rx="7"/>
        <rect x="-130"   y="95" width="250" height="14" rx="7"/>
        <rect x="-130"  y="130" width="150" height="14" rx="7"/>

        <rect x="-130"  y="185" width="230" height="14" rx="7"/>
      </g>
    </g>
  </g>

  <!-- White paper (front, slight tilt) -->
  <g transform="translate(384 430) rotate(-2)" filter="url(#paperShadow)">
    <!-- Paper body with rounded corners and folded top-right corner -->
    <path d="
      M -145 -240
      L 90 -240
      L 165 -165
      L 165 220
      Q 165 260 125 260
      L -125 260
      Q -165 260 -165 220
      L -165 -200
      Q -165 -240 -125 -240
      Z"
      fill="url(#paper)"/>

    <!-- Folded corner triangle -->
    <path d="M 90 -240 L 165 -165 L 90 -165 Z" fill="url(#fold)"/>

    <!-- Text lines -->
    <g fill="#d8dade">
      <rect x="-115" y="-100" width="230" height="18" rx="9"/>
      <rect x="-115"  y="-50" width="230" height="18" rx="9"/>
      <rect x="-115"  y="  0" width="230" height="18" rx="9"/>
      <rect x="-115"  y=" 50" width="230" height="18" rx="9"/>
      <rect x="-115"  y="100" width="150" height="18" rx="9"/>
    </g>
  </g>
</svg>
