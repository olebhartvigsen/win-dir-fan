ShortDescription: Animated fan folder popup for the Windows taskbar.
Description: |-
  FanFolder adds an animated "Fan" folder popup to the Windows taskbar.
  Click a taskbar icon and the most recently modified items in a configured folder
  fan out in an animated arc. Items can be opened, right-clicked for the full
  Windows shell context menu, or dragged to other applications.

  Features:
  - Per-user MSI install, no admin rights required.
  - Configurable source folder (works with OneDrive, Dropbox and other cloud folders).
  - Multiple animation styles: Fan, Glide, Spring, Fade and None.
  - Sort by date modified, date created or name; optional filename regex filter.
  - Full Windows shell context menu and drag-and-drop support.
  - Native x64 and ARM64 builds.
