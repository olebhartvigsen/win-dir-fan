ReleaseNotes: |-
  Highlights in 1.1.1:
  - Multi-architecture release pipeline (x64 + ARM64).
  - Combined Burn bootstrapper installer for easier distribution.
  - Refined Glide and Fan animations with per-item stagger and smoother easing.
  - Updated branding, including new app and taskbar icons.
  - Performance and correctness fixes, UI/behavior polish.
