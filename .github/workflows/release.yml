name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build FanFolder (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install WiX toolset
        run: dotnet tool install --global wix --version 4.0.5

      - name: Add WiX UI extension
        working-directory: installer
        run: wix extension add WixToolset.UI.wixext/4.0.5

      - name: Configure CMake
        run: cmake -B FanFolder/build -G "Visual Studio 17 2022" -A x64 -S FanFolder

      - name: Build Release exe
        run: cmake --build FanFolder/build --config Release

      - name: Build MSI installer
        working-directory: installer
        run: dotnet build FanFolder.wixproj -c Release -p:ProductVersion=${{ steps.version.outputs.VERSION }}

      - name: Upload assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "FanFolder/build/Release/FanFolder.exe" \
            "installer/output/FanFolderSetup.msi"
