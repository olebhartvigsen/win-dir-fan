name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build FanFolder (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
          - arch: arm64
            cmake_arch: ARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install WiX toolset
        run: dotnet tool install --global wix --version 4.0.5

      - name: Add WiX UI extension
        working-directory: installer
        run: wix extension add WixToolset.UI.wixext/4.0.5

      - name: Configure CMake
        run: cmake -B FanFolder/build -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }} -S FanFolder

      - name: Build Release exe
        run: cmake --build FanFolder/build --config Release

      - name: Build MSI installer
        working-directory: installer
        run: >
          dotnet build FanFolder.wixproj -c Release
          -p:Platform=${{ matrix.arch }}
          -p:ProductVersion=${{ steps.version.outputs.VERSION }}
          -p:OutputName=FanFolderSetup-${{ matrix.arch }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            FanFolder/build/Release/FanFolder.exe
            installer/output/FanFolderSetup-${{ matrix.arch }}.msi

  bundle:
    name: Create combined installer
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install WiX toolset
        run: dotnet tool install --global wix --version 4.0.5

      - name: Add WiX Bal extension
        working-directory: installer
        run: |
          wix extension add WixToolset.Bal.wixext/4.0.5
          wix extension add WixToolset.Util.wixext/4.0.5

      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-x64
          path: artifacts/x64

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-arm64
          path: artifacts/arm64

      - name: Build Burn bundle
        working-directory: installer/bundle
        run: >
          dotnet build FanFolderBundle.wixproj -c Release
          -p:ProductVersion=${{ steps.version.outputs.VERSION }}

      - name: Prepare release assets
        shell: bash
        run: |
          cp "artifacts/x64/FanFolder/build/Release/FanFolder.exe" "artifacts/x64/FanFolder-x64.exe"
          cp "artifacts/arm64/FanFolder/build/Release/FanFolder.exe" "artifacts/arm64/FanFolder-arm64.exe"

      - name: Generate winget manifests
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $isRelease = $env:GITHUB_EVENT_NAME -eq "release"
          $sha = git rev-parse --short HEAD
          $tag = if ($isRelease) { "${{ github.ref_name }}" } else { "dev-$sha" }
          $baseUrl = "https://github.com/olebhartvigsen/FanFolder/releases/download/$tag"

          $sha256_x64   = (Get-FileHash "artifacts/x64/installer/output/FanFolderSetup-x64.msi"   -Algorithm SHA256).Hash
          $sha256_arm64 = (Get-FileHash "artifacts/arm64/installer/output/FanFolderSetup-arm64.msi" -Algorithm SHA256).Hash

          function Get-MsiProductCode($path) {
            $installer = New-Object -ComObject WindowsInstaller.Installer
            $db = $installer.GetType().InvokeMember("OpenDatabase", "InvokeMethod", $null, $installer, @((Resolve-Path $path).Path, 0))
            $view = $db.GetType().InvokeMember("OpenView", "InvokeMethod", $null, $db, @("SELECT Value FROM Property WHERE Property='ProductCode'"))
            $view.GetType().InvokeMember("Execute", "InvokeMethod", $null, $view, $null)
            $record = $view.GetType().InvokeMember("Fetch", "InvokeMethod", $null, $view, $null)
            return $record.GetType().InvokeMember("StringData", "GetProperty", $null, $record, @(1))
          }

          $pc_x64   = Get-MsiProductCode "artifacts/x64/installer/output/FanFolderSetup-x64.msi"
          $pc_arm64 = Get-MsiProductCode "artifacts/arm64/installer/output/FanFolderSetup-arm64.msi"

          New-Item -ItemType Directory -Force winget-manifests | Out-Null

          Set-Content winget-manifests/OleBhartvigsen.FanFolder.yaml -Encoding UTF8 @"
# yaml-language-server: `$schema=https://aka.ms/winget-manifest.version.1.9.0.schema.json
PackageIdentifier: OleBhartvigsen.FanFolder
PackageVersion: $version
DefaultLocale: en-US
ManifestType: version
ManifestVersion: 1.9.0
"@

          Set-Content winget-manifests/OleBhartvigsen.FanFolder.installer.yaml -Encoding UTF8 @"
# yaml-language-server: `$schema=https://aka.ms/winget-manifest.installer.1.9.0.schema.json
PackageIdentifier: OleBhartvigsen.FanFolder
PackageVersion: $version
InstallerLocale: en-US
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.17763.0
InstallerType: msi
InstallModes:
  - silent
  - silentWithProgress
UpgradeBehavior: install
Installers:
  - Architecture: x64
    InstallerUrl: $baseUrl/FanFolderSetup-x64.msi
    InstallerSha256: $sha256_x64
    ProductCode: '$pc_x64'
    InstallerSwitches:
      Silent: /quiet /norestart
      SilentWithProgress: /passive /norestart
  - Architecture: arm64
    InstallerUrl: $baseUrl/FanFolderSetup-arm64.msi
    InstallerSha256: $sha256_arm64
    ProductCode: '$pc_arm64'
    InstallerSwitches:
      Silent: /quiet /norestart
      SilentWithProgress: /passive /norestart
ManifestType: installer
ManifestVersion: 1.9.0
"@

          Set-Content winget-manifests/OleBhartvigsen.FanFolder.locale.en-US.yaml -Encoding UTF8 @"
# yaml-language-server: `$schema=https://aka.ms/winget-manifest.defaultLocale.1.9.0.schema.json
PackageIdentifier: OleBhartvigsen.FanFolder
PackageVersion: $version
PackageLocale: en-US
Publisher: Ole Bhartvigsen
PublisherUrl: https://github.com/olebhartvigsen
PublisherSupportUrl: https://github.com/olebhartvigsen/FanFolder/issues
PackageName: FanFolder
PackageUrl: https://github.com/olebhartvigsen/FanFolder
License: MIT
LicenseUrl: https://github.com/olebhartvigsen/win-dir-fan/blob/master/LICENSE
ShortDescription: macOS-style animated fan folder for the Windows taskbar
Description: >-
  FanFolder replicates the macOS Dock "Fan" folder experience on the Windows
  taskbar. Clicking the taskbar icon reveals an animated, arc-shaped popup
  showing the most recently modified items in a configured folder. Items can
  be opened, right-clicked (full shell context menu), or dragged to other
  applications. Supports 16 languages and is fully configurable via the
  Windows registry.
Tags:
  - taskbar
  - productivity
  - launcher
  - dock
  - macos
  - fan
  - folder
  - utility
ManifestType: defaultLocale
ManifestVersion: 1.9.0
"@

      - name: Publish release to distribution repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          DIST_REPO: olebhartvigsen/FanFolder
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            TAG="${{ github.ref_name }}"
            TITLE="FanFolder ${{ steps.version.outputs.VERSION }}"
            PRERELEASE=""
          else
            SHA=$(git rev-parse --short HEAD)
            TAG="dev-${SHA}"
            TITLE="Dev build (${SHA})"
            PRERELEASE="--prerelease"
          fi

          # Create the release (ignore error if it already exists)
          gh release create "$TAG" \
            --repo "$DIST_REPO" \
            --title "$TITLE" \
            $PRERELEASE \
            --notes "Built from [win-dir-fan](https://github.com/olebhartvigsen/win-dir-fan) @ \`${SHA:-${{ github.ref_name }}}\`" \
            2>/dev/null || true

          gh release upload "$TAG" \
            --repo "$DIST_REPO" \
            --clobber \
            "artifacts/x64/FanFolder-x64.exe" \
            "artifacts/arm64/FanFolder-arm64.exe" \
            "artifacts/x64/installer/output/FanFolderSetup-x64.msi" \
            "artifacts/arm64/installer/output/FanFolderSetup-arm64.msi" \
            "installer/bundle/output/FanFolderSetup.exe" \
            "winget-manifests/OleBhartvigsen.FanFolder.yaml" \
            "winget-manifests/OleBhartvigsen.FanFolder.installer.yaml" \
            "winget-manifests/OleBhartvigsen.FanFolder.locale.en-US.yaml"
